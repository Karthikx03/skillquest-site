<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - SkillQuest</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Subject photo cards */
    .subj-photo-card {
      background: white;
      border-radius: var(--radius-2xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--slate-200);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .subj-photo-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .subj-card-img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      position: relative;
    }
    .subj-card-img-wrap {
      position: relative;
      overflow: hidden;
      height: 190px;
      flex-shrink: 0;
    }
    .subj-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .subj-card-img-wrap .color-tint {
      position: absolute;
      inset: 0;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    .subj-photo-card:hover .color-tint { opacity: 0.45; }
    .subj-card-badges {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .subj-badge {
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      display: inline-block;
    }
    .subj-card-body {
      padding: 22px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .subj-card-body h3 {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .subj-card-body > p {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.65;
      flex: 1;
      margin-bottom: 16px;
    }
    .subj-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .subj-course-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .subj-course-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .subj-course-extra {
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div id="navbar"></div>
<div class="nav-spacer"></div>

<div class="page-header">
  <div class="container">
    <div class="section-tag" style="color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.1);">36 Courses Available</div>
    <h1>Choose Your Learning Path</h1>
    <p>Six subjects, each packed with practical courses designed to build real-world skills.</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:36px;flex-wrap:wrap;">
      <div class="search-bar" style="max-width:360px;width:100%;">
        <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input type="text" class="form-input" id="searchInput" placeholder="Search courses and subjects…" oninput="filterSubjects(this.value)" style="padding-left:44px;">
      </div>
    </div>
    <div class="subjects-grid" id="subjectsGrid"></div>
    <div id="noResults" style="display:none;text-align:center;padding:60px 0;color:var(--text-muted);">
      <div style="margin-bottom:16px;display:flex;justify-content:center;"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--slate-400)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
      <h3>No courses or subjects found</h3>
      <p>Try a different search term.</p>
    </div>
  </div>
</section>

<div id="footer"></div>
<script src="js/api.js"></script>
  <script src="js/seed.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
  requireAuth();
  initPage();

  /* Per-subject photo, accent color, and optional badge */
  const subjectMeta = {
    'ai-tech':         { photo: 'https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=640&q=80&auto=format&fit=crop', badge: 'Most Popular', badgeBg: '#7c3aed', badgeColor: '#fff', extra: null },
    'finance':         { photo: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=640&q=80&auto=format&fit=crop', badge: null, badgeBg: null, badgeColor: null, extra: '+ 2 more coming soon' },
    'cybersecurity':   { photo: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=640&q=80&auto=format&fit=crop', badge: 'Trending', badgeBg: '#dc2626', badgeColor: '#fff', extra: null },
    'digital':         { photo: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=640&q=80&auto=format&fit=crop', badge: null, badgeBg: null, badgeColor: null, extra: '+ 1 more coming soon' },
    'career':          { photo: 'https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=640&q=80&auto=format&fit=crop', badge: 'New Content', badgeBg: '#059669', badgeColor: '#fff', extra: null },
    'entrepreneurship':{ photo: 'https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=640&q=80&auto=format&fit=crop', badge: null, badgeBg: null, badgeColor: null, extra: null }
  };

  function renderSubjects(subjects) {
    const user = getCurrentUser();
    const grid = document.getElementById('subjectsGrid');
    if (!subjects.length) {
      grid.innerHTML = '';
      document.getElementById('noResults').style.display = 'block';
      return;
    }
    document.getElementById('noResults').style.display = 'none';

    grid.innerHTML = subjects.map(s => {
      const progress     = user ? getProgress(user.id) : {};
      const subjectProg  = progress[s.id] || {};
      const completedCount = Object.values(subjectProg).filter(c => c.completed).length;
      const pct          = s.courses.length ? Math.round(completedCount / s.courses.length * 100) : 0;
      const meta         = subjectMeta[s.id] || {};
      const color        = getSubjectColor(s.color);

      const badgeHtml = meta.badge
        ? `<span class="subj-badge" style="background:${meta.badgeBg};color:${meta.badgeColor};">${meta.badge}</span>`
        : '';

      const progressHtml = completedCount > 0 ? `
        <div style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:5px;">
            <span>${completedCount} of ${s.courses.length} courses completed</span><span>${pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color};"></div></div>
        </div>` : '';

      return `
        <a href="subject.html?id=${s.id}" class="subj-photo-card">
          <div class="subj-card-img-wrap">
            <img src="${meta.photo || ''}" alt="${s.title}" loading="lazy">
            <div class="color-tint" style="background:${color};"></div>
            <div class="subj-card-badges">${badgeHtml}</div>
          </div>
          <div class="subj-card-body">
            <h3>${s.title}</h3>
            <p>${s.description}</p>
            ${progressHtml}
            <div class="subj-card-footer">
              <div class="subj-course-meta">
                <span class="subj-course-count">${s.courses.length} Courses</span>
                ${meta.extra ? `<span class="subj-course-extra">${meta.extra}</span>` : ''}
              </div>
              <span class="btn btn-sm" style="background:${color};color:white;border:none;">Explore &rarr;</span>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  function filterSubjects(query) {
    const q = query.toLowerCase().trim();
    if (!q) { renderSubjects(SUBJECTS); return; }

    // Match text by word-prefix only (e.g. "ai" matches "AI & Technology" but NOT "fundraising").
    // We deliberately do NOT use t.includes(q) because "entrepreneurial".includes("ai") = true.
    function textMatches(text) {
      return text.toLowerCase().split(/\s+/).some(word => word.startsWith(q));
    }

    // Match IDs by hyphen-segment prefix only (NOT substring).
    // This prevents "fundraising" matching "ai" because r-a-i happens to appear in the word.
    // Correct: 'ai-tech'.split('-') → ['ai','tech'] → 'ai'.startsWith('ai') ✓
    // Blocked: 'fundraising'.split('-') → ['fundraising'] → no segment starts with 'ai' ✓
    function idMatches(id) {
      return id.toLowerCase().split(/[-_]/).some(seg => seg.startsWith(q));
    }

    const filtered = SUBJECTS.filter(s =>
      textMatches(s.title) ||
      idMatches(s.id) ||
      s.courses.some(c => textMatches(c.title) || idMatches(c.id))
    );
    renderSubjects(filtered);
  }

  renderSubjects(SUBJECTS);
</script>
</body>
</html>

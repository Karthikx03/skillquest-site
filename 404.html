<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – SkillQuest</title>
  <link rel="icon" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      min-height: 60vh;
    }
    .not-found-code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 20px;
    }
    .not-found-title {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 16px;
    }
    .not-found-desc {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .not-found-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
<div id="navbar"></div>
<div class="nav-spacer"></div>

<section class="not-found-section">
  <div class="not-found-code">404</div>
  <h1 class="not-found-title">Page Not Found</h1>
  <p class="not-found-desc">The page you are looking for does not exist or has been moved. Here are some helpful links to get you back on track.</p>
  <div class="not-found-links">
    <a href="index.html" class="btn btn-primary">Home</a>
    <a href="courses.html" class="btn btn-secondary">Browse Courses</a>
    <a href="dashboard.html" class="btn btn-ghost">Dashboard</a>
  </div>
</section>

<div id="footer"></div>
<script src="js/api.js"></script>
<script src="js/seed.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
  initPage();
</script>
</body>
</html>

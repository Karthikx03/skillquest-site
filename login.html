<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkillQuest</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon"><svg width="26" height="26" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 3L21 8L11 13L1 8Z" fill="white"/><path d="M5 9.8V15.5C5 15.5 7.5 18.5 11 18.5C14.5 18.5 17 15.5 17 15.5V9.8L11 13L5 9.8Z" fill="white" opacity="0.82"/><path d="M21 8V13" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/><circle cx="21" cy="13.8" r="1.1" fill="white" opacity="0.9"/></svg></div>
      <h1>Welcome Back</h1>
      <p>Log in to continue your learning journey</p>
    </div>
    <div id="loginError" class="error-message"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;" id="loginBtn">Login</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
  <script src="js/seed.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
  initPage();
  // If already logged in, redirect
  if (isLoggedIn()) {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'dashboard.html';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const errDiv   = document.getElementById('loginError');

    btn.disabled    = true;
    btn.textContent = 'Logging in...';

    const result = await login(email, password);
    if (result.success) {
      showToast('Welcome back, ' + result.user.name + '!', 'success');
      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('redirect') || 'dashboard.html';
      }, 500);
    } else {
      errDiv.textContent = result.error;
      errDiv.className   = 'error-message show';
      btn.disabled       = false;
      btn.textContent    = 'Log in';
    }
  }
</script>
</body>
</html>

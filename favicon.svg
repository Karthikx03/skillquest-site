<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.3  0 0 0 0 0.4  0 0 0 0 1  0 0 0 0.5 0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- Top shine overlay (3D top-lit effect) -->
  <rect width="32" height="16" rx="7.5" fill="url(#shine)"/>

  <!-- 3D depth shadow of shield (behind, slightly offset) -->
  <path d="M16 5.8L9.2 9.3v4.9c0 3.9 2.7 7.5 6.8 8.5 4.1-1 6.8-4.6 6.8-8.5V9.3L16 5.8z"
        fill="black" fill-opacity="0.15" transform="translate(0.4,0.7)"/>

  <!-- Shield body -->
  <path d="M16 5L9 9v5.2c0 4.2 3 8 7 9.2 4-1.2 7-5 7-9.2V9L16 5z"
        fill="white" fill-opacity="0.2"/>

  <!-- Shield top-face highlight (3D lit from above) -->
  <path d="M16 5L9 9l7 2.4 7-2.4L16 5z"
        fill="white" fill-opacity="0.32"/>

  <!-- Left-face shade (3D left shadow) -->
  <path d="M9 9v5.2c0 2.9 1.3 5.6 3.5 7.5L9 9z"
        fill="black" fill-opacity="0.06"/>

  <!-- Shield border with glow -->
  <path d="M16 5L9 9v5.2c0 4.2 3 8 7 9.2 4-1.2 7-5 7-9.2V9L16 5z"
        fill="none" stroke="white" stroke-width="1.4" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Inner edge (polished rim) -->
  <path d="M16 5.8L9.6 9.5v4.8c0 3.7 2.5 7.1 6.4 8.2 3.9-1.1 6.4-4.5 6.4-8.2V9.5L16 5.8z"
        fill="none" stroke="white" stroke-width="0.4" stroke-opacity="0.35" stroke-linejoin="round"/>

  <!-- Checkmark with glow -->
  <path d="M13 14l2.4 2.4L20 11"
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - SkillQuest</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .star-filled { color: #f59e0b; }
    .star-empty  { color: #cbd5e1; }
    .stars-row svg { width: 28px; height: 28px; margin: 0 2px; }
  </style>
</head>
<body>
<div id="navbar"></div>
<div class="nav-spacer"></div>

<section class="section">
  <div class="container" style="max-width:760px;">
    <div class="breadcrumb" id="breadcrumb" style="margin-bottom:28px;"></div>

    <!-- QUIZ IN PROGRESS -->
    <div id="quizArea">
      <div style="text-align:center;margin-bottom:32px;">
        <h1 style="font-size:clamp(24px,4vw,36px);font-weight:800;margin-bottom:8px;" id="quizTitle">Quiz</h1>
        <p style="color:var(--text-muted);" id="quizSubtitle">Test your knowledge</p>
      </div>

      <div class="quiz-card">
        <div class="quiz-progress">
          <div class="quiz-meta">
            <span class="quiz-score" id="scoreDisplay">Score: 0 / 5</span>
            <span class="quiz-count" id="questionCount">Question 1 of 5</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="quizProgressBar" style="width:0%;"></div>
          </div>
        </div>

        <div class="question-text" id="questionText">Loading...</div>

        <div class="options-grid" id="optionsGrid"></div>

        <div class="quiz-feedback" id="quizFeedback"></div>

        <div style="display:flex;justify-content:flex-end;">
          <button class="btn btn-primary" id="nextBtn" style="display:none;" onclick="nextQuestion()">
            Next Question &#8594;
          </button>
        </div>
      </div>
    </div>

    <!-- RESULTS PANEL -->
    <div id="resultsArea" style="display:none;">
      <div class="quiz-card quiz-results">
        <div style="display:flex;justify-content:center;margin-bottom:12px;">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2 style="font-size:24px;font-weight:800;margin-bottom:20px;text-align:center;" id="resultTitle">Quiz Complete!</h2>

        <div class="result-score-big" id="resultScore">4 / 5</div>
        <div class="result-percentage" id="resultPercent">80%</div>

        <div class="stars-row" id="starsRow"></div>

        <div class="result-points" id="resultPoints">You earned 40 points!</div>

        <p id="resultMsg" style="color:var(--text-muted);font-size:15px;margin:12px 0 24px;max-width:440px;margin-left:auto;margin-right:auto;text-align:center;"></p>

        <div class="result-actions">
          <button class="btn btn-secondary" onclick="retakeQuiz()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.59"/></svg>Retake Quiz
          </button>
          <a id="backCourseBtn" href="subject.html" class="btn btn-ghost">&#8592; Back to Course</a>
          <a id="certBtn" href="#" class="btn btn-teal" style="display:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>View Certificate
          </a>
        </div>

        <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--slate-200);">
          <a id="nextCourseBtn" href="courses.html" class="btn btn-primary btn-lg" style="width:100%;">Continue Learning &#8594;</a>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer"></div>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
  requireAuth();
  initPage();

  const params = new URLSearchParams(window.location.search);
  const subjectId = params.get('subject');
  const courseId = params.get('course');
  const user = getCurrentUser();

  const subject = SUBJECTS.find(s => s.id === subjectId);
  const course = subject ? subject.courses.find(c => c.id === courseId) : null;

  if (!subject || !course) {
    document.getElementById('questionText').textContent = 'Course not found.';
  } else {
    document.title = course.title + ' Quiz - SkillQuest';

    // Breadcrumb
    document.getElementById('breadcrumb').innerHTML = `
      <a href="courses.html">Courses</a><span>›</span>
      <a href="subject.html?id=${subjectId}">${subject.title}</a><span>›</span>
      <a href="lesson.html?subject=${subjectId}&course=${courseId}&lesson=0">${course.title}</a><span>›</span>
      <span>Quiz</span>
    `;

    document.getElementById('quizTitle').textContent = course.title + ': Quiz';
    document.getElementById('quizSubtitle').textContent = subject.title + ' • ' + course.points + ' points available';

    const questions = course.quiz;
    let currentQ = 0;
    let score = 0;
    let answered = 0;
    let answeredCurrent = false;

    function renderQuestion() {
      const q = questions[currentQ];
      answeredCurrent = false;

      document.getElementById('questionText').textContent = q.question;
      document.getElementById('questionCount').textContent = 'Question ' + (currentQ + 1) + ' of ' + questions.length;
      document.getElementById('scoreDisplay').textContent = 'Score: ' + score + ' / ' + questions.length;
      document.getElementById('quizProgressBar').style.width = (currentQ / questions.length * 100) + '%';

      const feedback = document.getElementById('quizFeedback');
      feedback.className = 'quiz-feedback';
      feedback.textContent = '';
      document.getElementById('nextBtn').style.display = 'none';

      const letters = ['A', 'B', 'C', 'D'];
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectAnswer(${i})" id="opt${i}">
          <span class="option-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('');
    }

    function selectAnswer(selected) {
      if (answeredCurrent) return;
      answeredCurrent = true;

      const q = questions[currentQ];
      const correct = q.answer;
      const isCorrect = selected === correct;

      if (isCorrect) score++;
      answered++;

      document.getElementById('scoreDisplay').textContent = 'Score: ' + score + ' / ' + questions.length;

      for (let i = 0; i < q.options.length; i++) {
        const btn = document.getElementById('opt' + i);
        btn.disabled = true;
        if (i === correct) btn.classList.add('option-correct');
        else if (i === selected && !isCorrect) btn.classList.add('option-wrong');
      }

      const feedback = document.getElementById('quizFeedback');
      if (isCorrect) {
        feedback.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><polyline points="20 6 9 17 4 12"/></svg>Correct! Well done!';
        feedback.className = 'quiz-feedback correct';
      } else {
        feedback.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Incorrect. The correct answer was: ' + q.options[correct];
        feedback.className = 'quiz-feedback wrong';
      }

      const nextBtn = document.getElementById('nextBtn');
      if (currentQ < questions.length - 1) {
        nextBtn.textContent = 'Next Question →';
        nextBtn.style.display = 'inline-flex';
      } else {
        nextBtn.textContent = 'See Results →';
        nextBtn.style.display = 'inline-flex';
      }
    }

    function nextQuestion() {
      if (currentQ < questions.length - 1) {
        currentQ++;
        renderQuestion();
        window.scrollTo(0, 0);
      } else {
        showResults();
      }
    }

    const starFilledSvg = '<svg viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    const starEmptySvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

    function showResults() {
      document.getElementById('quizArea').style.display = 'none';
      document.getElementById('resultsArea').style.display = 'block';

      const total = questions.length;
      const pct = Math.round(score / total * 100);
      const pointsEarned = Math.round(course.points * (score / total));

      document.getElementById('resultScore').textContent = score + ' / ' + total + ' Correct';
      document.getElementById('resultPercent').textContent = pct + '%';
      document.getElementById('resultPoints').textContent = 'You earned ' + pointsEarned + ' points!';

      const stars = Math.round(pct / 20);
      document.getElementById('starsRow').innerHTML =
        Array.from({length: 5}, (_, i) => `<span class="${i < stars ? 'star-filled' : 'star-empty'}">${i < stars ? starFilledSvg : starEmptySvg}</span>`).join('');

      let msg = '';
      if (pct === 100) msg = 'Perfect score! You have mastered this topic!';
      else if (pct >= 80) msg = 'Excellent work! You have earned your certificate for this course.';
      else if (pct >= 60) msg = 'Good effort! Review the lessons and try again to improve your score.';
      else msg = 'Keep practicing! Read through the lessons again and retake the quiz.';
      document.getElementById('resultMsg').textContent = msg;

      const certBtn = document.getElementById('certBtn');
      if (pct >= 80) {
        certBtn.href = 'certificate.html?subject=' + subjectId + '&course=' + courseId;
        certBtn.style.display = 'inline-flex';
      }

      document.getElementById('backCourseBtn').href = 'subject.html?id=' + subjectId;

      addUserPoints(user.id, pointsEarned);
      markCourseComplete(user.id, subjectId, courseId, score, pointsEarned, total);

      showToast('Quiz complete! You earned ' + pointsEarned + ' points.', 'success');
      window.scrollTo(0, 0);
    }

    function retakeQuiz() {
      currentQ = 0;
      score = 0;
      answered = 0;
      document.getElementById('quizArea').style.display = 'block';
      document.getElementById('resultsArea').style.display = 'none';
      renderQuestion();
    }

    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.retakeQuiz = retakeQuiz;

    renderQuestion();
  }
</script>
</body>
</html>
